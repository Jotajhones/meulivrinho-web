<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Livrinho - Biblioteca Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  
  <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Meu Livrinho",
        "url": "https://www.meulivrinho.art.br",
        "description": "Biblioteca digital gratuita e acessível de literatura infantil para crianças em fase de alfabetização.",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.meulivrinho.art.br/?search={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
  </script>

  <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Meu Livrinho",
        "url": "https://www.meulivrinho.art.br",
        "contactPoint": {
            "@type": "ContactPoint",
            "email": "jpjpjplima@gmail.com",
            "contactType": "voluntariado"
        }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
